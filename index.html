<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification — EnglishGO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #fe302d; --accent-light: #fff1f1; --accent-dark: #cc1a18;
    --text: #0f172a; --sub: #64748b; --border: #e2e8f0; --bg: #f8fafc; --white: #fff;
    --green: #16a34a; --green-bg: #f0fdf4; --green-border: #bbf7d0;
    --red: #dc2626; --red-bg: #fef2f2; --red-border: #fecaca;
  }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 16px; }
  .topbar { display: flex; flex-direction: column; align-items: center; gap: 6px; margin-bottom: 28px; animation: up 0.4s ease both; }
  .logo-img { width: 88px; height: 88px; object-fit: contain; border-radius: 14px; }
  .school-name { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: -0.2px; }
  .school-name strong { color: var(--accent); font-weight: 700; }
  .school-tagline { font-size: 11px; color: var(--sub); }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 500px; overflow: hidden; animation: up 0.45s ease 0.05s both; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .card-top { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .card-top-icon { width: 36px; height: 36px; border-radius: 10px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .card-top-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .card-top-sub { font-size: 12px; color: var(--sub); margin-top: 1px; }
  .card-body { padding: 28px; }
  .loader { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 12px 0; }
  .spin { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  .loader p { font-size: 13px; color: var(--sub); }
  .status { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: 10px; border: 1px solid; margin-bottom: 24px; }
  .status.ok { background: var(--green-bg); border-color: var(--green-border); }
  .status.err { background: var(--red-bg); border-color: var(--red-border); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .ok .status-dot { background: var(--green); } .err .status-dot { background: var(--red); }
  .status strong { font-size: 13px; font-weight: 500; display: block; }
  .ok strong { color: var(--green); } .err strong { color: var(--red); }
  .status small { font-size: 11px; color: var(--sub); }
  .cert-name { font-family: "DM Serif Display", serif; font-size: 30px; color: var(--text); line-height: 1.15; margin-bottom: 4px; }
  .cert-course { font-size: 13px; color: var(--sub); margin-bottom: 20px; }
  .sep { height: 1px; background: var(--border); margin: 18px 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .field label { font-size: 10px; font-weight: 500; color: var(--sub); letter-spacing: 0.8px; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .field .val { font-size: 13px; font-weight: 500; color: var(--text); }
  .level-wrap { margin-bottom: 20px; }
  .level-wrap > label { font-size: 10px; font-weight: 500; color: var(--sub); letter-spacing: 0.8px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .level-steps { display: flex; gap: 4px; }
  .level-step { flex: 1; height: 6px; border-radius: 99px; background: var(--border); }
  .level-step.past { background: #fca5a5; }
  .level-step.active { background: var(--accent); }
  .level-labels { display: flex; gap: 4px; margin-top: 5px; }
  .level-labels span { flex: 1; text-align: center; font-size: 10px; color: var(--sub); }
  .level-labels span.active { color: var(--accent); font-weight: 600; }
  .id-row { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; }
  .id-row label { font-size: 10px; font-weight: 500; color: var(--sub); letter-spacing: 0.8px; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .id-row .id-val { font-family: "Courier New", monospace; font-size: 13px; color: var(--text); font-weight: 600; }
  .chip { display: inline-flex; align-items: center; gap: 4px; background: var(--accent-light); color: var(--accent); font-size: 10px; font-weight: 500; padding: 4px 8px; border-radius: 99px; }
  .empty { text-align: center; padding: 8px 0 4px; }
  .empty .icon { font-size: 36px; margin-bottom: 12px; }
  .empty h2 { font-family: "DM Serif Display", serif; font-size: 20px; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; color: var(--sub); line-height: 1.6; }
  .empty code { font-size: 11px; background: var(--bg); padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border); }
  .footer { margin-top: 20px; width: 100%; max-width: 500px; animation: up 0.45s ease 0.1s both; }
  .contacts { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .contact-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); font-size: 12px; font-weight: 500; color: var(--text); text-decoration: none; transition: border-color 0.15s, background 0.15s, color 0.15s; font-family: "DM Sans", sans-serif; }
  .contact-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
  .footer-copy { text-align: center; font-size: 11px; color: #94a3b8; }
  @keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
const DATA_URL = "https://englishgokz.github.io/certificates/certificates.json";
const LEVELS = ["A1","A2","B1","B2","C1","C2"];
const id = new URLSearchParams(window.location.search).get("id");
const body = document.getElementById("body");

function levelBar(level) {
  if (!level) return "";
  const code = level.split(" ")[0].toUpperCase();
  const idx = LEVELS.indexOf(code);
  if (idx === -1) return "";
  const steps = LEVELS.map((l,i) => "<div class=\"level-step " + (i===idx?"active":i<idx?"past":"") + "\"></div>").join("");
  const labels = LEVELS.map((l,i) => "<span class=\"" + (i===idx?"active":"") + "\">" + l + "</span>").join("");
  return "<div class=\"level-wrap\"><label>Language Level</label><div class=\"level-steps\">" + steps + "</div><div class=\"level-labels\">" + labels + "</div></div>";
}

function renderCert(c, id) {
  const rev = c.status === "revoked";
  return "<div class=\"status " + (rev?"err":"ok") + "\"><div class=\"status-dot\"></div><div><strong>" + (rev?"Certificate has been revoked":"Certificate is valid") + "</strong><small>" + (rev?"This certificate has been revoked":"Verified · " + new Date().toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})) + "</small></div></div>"
    + "<div class=\"cert-name\">" + c.name + "</div>"
    + "<div class=\"cert-course\">" + c.course + "</div>"
    + (c.level ? levelBar(c.level) : "")
    + "<div class=\"grid\">"
    + "<div class=\"field\"><label>Issue Date</label><div class=\"val\">" + c.date + "</div></div>"
    + "<div class=\"field\"><label>Institution</label><div class=\"val\">" + c.org + "</div></div>"
    + (c.hours ? "<div class=\"field\"><label>Duration</label><div class=\"val\">" + c.hours + " hours</div></div>" : "")
    + "</div>"
    + "<div class=\"sep\"></div>"
    + "<div class=\"id-row\"><div><label>Certificate ID</label><div class=\"id-val\">" + id + "</div></div>"
    + "<div class=\"chip\"><svg width=\"10\" height=\"10\" viewBox=\"0 0 10 10\" fill=\"none\"><path d=\"M2 5l2 2 4-4\" stroke=\"#fe302d\" stroke-width=\"1.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>Verified</div></div>";
}

async function init() {
  if (!id) { body.innerHTML = "<div class=\"empty\"><div class=\"icon\">📋</div><h2>No Certificate ID</h2><p>Scan the QR code on the certificate.<br>Or add to the URL: <code>?id=CERT-2026-001</code></p></div>"; return; }
  try {
    const res = await fetch(DATA_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error();
    const data = await res.json();
    const cert = data[id];
    body.innerHTML = cert ? renderCert(cert, id) : "<div class=\"empty\"><div class=\"icon\">🔍</div><h2>Certificate not found</h2><p>ID <strong>" + id + "</strong> was not found in our database.<br>Please check the QR code or contact EnglishGO.</p></div>";
  } catch(e) {
    body.innerHTML = "<div class=\"empty\"><div class=\"icon\">⚠️</div><h2>Loading error</h2><p>Could not connect to the database.<br>Please try again later.</p></div>";
  }
}
init();
</script>
